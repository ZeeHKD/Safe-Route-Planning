<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Safe School Route Planner</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Safer Route Planner</h1>
  <p>Alhamdulillah, my setup works!!!</p>
  <div id="controls">
    <label for="start">Start Location:</label>
    <input type="text" id="start" placeholder="Enter start point">

    <label for="end">End Location:</label>
    <input type="text" id="end" placeholder="Enter destination">

    <button id="routeBtn">Get Route</button>
  </div>
  <div id="map"></div>

  <script src="script.js"></script>
</body>
</html>
